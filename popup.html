<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speed Offset ETA</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 220px;
        font-family: Arial, sans-serif;
        color: #202124;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: #5f6368;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #dadce0;
        border-radius: 8px;
      }

      .help {
        margin-top: 4px;
        font-size: 11px;
        line-height: 1.4;
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <h1>Speed Offset ETA</h1>
    <div class="help">
      Adjusted ETA uses Google route values only:
      <br />
      <strong>distance / duration</strong> for each visible route.
      <br />
      If distance is not visible for a route card, that route shows
      <strong>Adj n/a</strong>.
    </div>
  </body>
</html>
